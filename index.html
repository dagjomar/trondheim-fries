<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Jakten på den perfekte pommes frites i Trondheim — én mening, ristet i potet."
    />
    <title>Trondheim Fries — Pommes Frites Rangering</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Chewy&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="grain" aria-hidden="true"></div>

    <!-- Hero Section -->
    <section class="section section--hero" id="hero">
      <div class="hero-content">
        <p class="hero-tag">Trondheim · Norge</p>
        <h1 class="hero-title">
          <span class="hero-title__main">Trondheim</span>
          <span class="hero-title__fries">Fries</span>
        </h1>
        <p class="hero-subtitle" data-i18n="siteSubtitle"></p>
        <div class="hero-prose">
          <p data-i18n="heroLead"></p>
          <p data-i18n="heroBody"></p>
        </div>
        <nav class="hero-nav" aria-label="Seksjon-navigasjon">
          <a href="#map-section" class="btn btn--primary" data-i18n="scrollToMap"></a>
          <a href="#list-section" class="btn btn--secondary" data-i18n="scrollToList"></a>
        </nav>
      </div>
      <div class="hero-fry-decoration" aria-hidden="true">
        <div class="fry-stick fry-stick--1"></div>
        <div class="fry-stick fry-stick--2"></div>
        <div class="fry-stick fry-stick--3"></div>
        <div class="fry-stick fry-stick--4"></div>
        <div class="fry-stick fry-stick--5"></div>
      </div>
    </section>

    <!-- Map Section (full viewport) -->
    <section class="section section--map" id="map-section">
      <div class="section-header section-header--overlay">
        <h2 data-i18n="mapHeading"></h2>
        <p data-i18n="mapHint"></p>
      </div>
      <div id="map" class="map-fullscreen" role="application" aria-label="Kart over rangerte steder i Trondheim"></div>
    </section>

    <!-- Rankings List Section -->
    <section class="section section--list" id="list-section">
      <div class="section-header">
        <h2 data-i18n="listHeading"></h2>
        <p data-i18n="listHint"></p>
      </div>
      <ol class="rank-list" id="rank-list"></ol>
    </section>

    <!-- About Section -->
    <section class="section section--about" id="about-section">
      <div class="about-content">
        <h2 data-i18n="aboutHeading"></h2>
        <p data-i18n="aboutText"></p>
      </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer">
      <p data-i18n="footerText"></p>
      <div class="lang-switcher">
        <button class="lang-btn" data-lang="no" aria-label="Norsk">🇳🇴 Norsk</button>
        <button class="lang-btn" data-lang="en" aria-label="English">🇬🇧 English</button>
      </div>
    </footer>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="i18n.js"></script>
    <script src="main.js"></script>
  </body>
</html>
