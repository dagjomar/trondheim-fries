<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="Jakten på den perfekte pommes frites i Trondheim — en retro-inspirert frites-quest."
    />
    <title>Trondheim Fries — Pommes Frites Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap"
      rel="stylesheet"
    />
    <link
      rel="stylesheet"
      href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"
      integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY="
      crossorigin=""
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Scanlines overlay -->
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Hero / Title Screen -->
    <section class="title-screen" id="title-screen">
      <div class="title-screen__content">
        <div class="pixel-border title-card">
          <p class="title-card__location">TRONDHEIM · NORGE</p>
          <h1 class="title-card__name">
            <span class="title-glow">TRONDHEIM</span>
            <span class="title-fries">FRIES</span>
          </h1>
          <p class="title-card__subtitle" data-i18n="siteSubtitle"></p>
        </div>
        <div class="title-prose">
          <p data-i18n="heroLead"></p>
          <p data-i18n="heroBody"></p>
        </div>
        <button class="btn-start pixel-border" id="start-btn">
          <span class="btn-start__icon">▶</span>
          <span data-i18n="heroStart"></span>
        </button>
        <div class="title-coins" aria-hidden="true">
          <span class="coin">🍟</span>
          <span class="coin">🍟</span>
          <span class="coin">🍟</span>
        </div>
      </div>
      <div class="title-screen__map-peek" aria-hidden="true">
        <div id="map-peek"></div>
      </div>
    </section>

    <!-- Main Game Screen (split) -->
    <section class="game-screen" id="game-screen">
      <!-- Left Panel: List / Review -->
      <div class="panel-left" id="panel-left">
        <div class="panel-left__header pixel-border-bottom">
          <h2 class="panel-left__title" data-i18n="listHeading"></h2>
          <div class="hud">
            <span class="hud__stations"><span id="station-count">8</span> stasjoner</span>
          </div>
        </div>
        <div class="panel-left__body" id="panel-body">
          <!-- List or review content injected here -->
        </div>
      </div>

      <!-- Right Panel: Map -->
      <div class="panel-right" id="panel-right">
        <div id="map" class="map-container" role="application" aria-label="Kart over rangerte steder i Trondheim"></div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer pixel-border-top">
      <p data-i18n="footerText"></p>
      <div class="lang-switcher">
        <button class="lang-btn pixel-border" data-lang="no">🇳🇴 NO</button>
        <button class="lang-btn pixel-border" data-lang="en">🇬🇧 EN</button>
      </div>
    </footer>

    <script
      src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"
      integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo="
      crossorigin=""
    ></script>
    <script src="i18n.js"></script>
    <script src="data.js"></script>
    <script src="main.js"></script>
  </body>
</html>
