<!DOCTYPE html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="description" content="Jakten på den perfekte pommes frites i Trondheim — en 2D retro game-quest." />
    <title>Trondheim Fries — Pommes Frites Quest</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,600;0,9..40,700;1,9..40,400&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="scanlines" aria-hidden="true"></div>

    <!-- Title Screen -->
    <section class="title-screen" id="title-screen">
      <div class="title-screen__content">
        <div class="pixel-border title-card">
          <p class="title-card__location">TRONDHEIM · NORGE</p>
          <h1 class="title-card__name">
            <span class="title-glow">TRONDHEIM</span>
            <span class="title-fries">FRIES</span>
          </h1>
          <p class="title-card__subtitle" data-i18n="siteSubtitle"></p>
        </div>
        <div class="title-prose">
          <p data-i18n="heroLead"></p>
          <p data-i18n="heroBody"></p>
        </div>
        <button class="btn-start pixel-border" id="start-btn">
          <span class="btn-start__icon">▶</span>
          <span data-i18n="heroStart"></span>
        </button>
        <div class="title-controls">
          <p class="title-controls__text">← → ↑ ↓ WALK &nbsp;&nbsp; ENTER = ENTER SHOP</p>
        </div>
        <div class="title-coins" aria-hidden="true">
          <span class="coin">🍟</span><span class="coin">🍟</span><span class="coin">🍟</span>
        </div>
      </div>
      <div class="title-screen__preview">
        <div class="preview-grid">
          <div class="preview-tile preview-tile--grass"></div>
          <div class="preview-tile preview-tile--road"></div>
          <div class="preview-tile preview-tile--water"></div>
          <div class="preview-tile preview-tile--building"></div>
          <div class="preview-tile preview-tile--shop"></div>
          <div class="preview-tile preview-tile--tree"></div>
        </div>
        <p class="preview-hint">Explore pixel Trondheim</p>
      </div>
    </section>

    <!-- Game Screen -->
    <section class="game-screen" id="game-screen">
      <div class="game-world" id="game-world">
        <canvas id="game-canvas"></canvas>
      </div>
      <div class="review-overlay" id="review-overlay">
        <div class="review-overlay__content" id="review-content"></div>
      </div>
    </section>

    <!-- Footer -->
    <footer class="site-footer pixel-border-top">
      <p data-i18n="footerText"></p>
      <div class="lang-switcher">
        <button class="lang-btn pixel-border" data-lang="no">🇳🇴 NO</button>
        <button class="lang-btn pixel-border" data-lang="en">🇬🇧 EN</button>
      </div>
    </footer>

    <script src="i18n.js"></script>
    <script src="data.js"></script>
    <script src="sprites.js"></script>
    <script src="tilemap.js"></script>
    <script src="engine.js"></script>
    <script src="main.js"></script>
  </body>
</html>
